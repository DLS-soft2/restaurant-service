services:
  db:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  restaurant-service:
    build: .
    ports:
      - "8002:8002"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://db:27017/restaurant_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  mongo_data: