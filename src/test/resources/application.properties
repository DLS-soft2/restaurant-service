# Flapdoodle in-memory MongoDB
de.flapdoodle.mongodb.embedded.version=7.0.0

spring.graphql.graphiql.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,com.dls.authlib.AuthLibAutoConfiguration

# Kafka (properties needed for bean creation, but auto-config is excluded above)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=restaurant-service-group
spring.kafka.consumer.auto-offset-reset=earliest
app.kafka.topic.payments=payments
app.kafka.topic.restaurants=restaurants
